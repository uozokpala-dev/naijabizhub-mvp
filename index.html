<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnambraHub - Verified Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .app-container { user-select: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="text-slate-800 antialiased app-container">

    <div id="onboardingScreen" class="fixed inset-0 bg-slate-950 z-[200] flex flex-col justify-between p-6 max-w-md mx-auto">
        <div class="text-center mt-16">
            <div class="w-20 h-20 bg-green-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-green-900/30">
                <i class="fa-solid fa-shield-check text-white text-4xl"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tight text-white">Anambra<span class="text-green-500">Hub</span></h1>
            <p class="text-slate-400 text-sm mt-2">Find any business or artisan in Anambra,<br>anywhere, anytime.</p>
        </div>

        <div class="space-y-4 mb-12">
            <p class="text-xs font-bold text-center text-slate-500 uppercase tracking-widest">Select Your Destination</p>
            
            <button onclick="enterApp('customer')" class="w-full bg-white hover:bg-slate-100 text-slate-950 p-5 rounded-2xl font-bold flex items-center justify-between transition border border-slate-200 text-left shadow-lg">
                <div>
                    <span class="text-base block">I Need an Artisan / Service</span>
                    <span class="text-xs text-slate-500 font-normal">Find verified mechanics, plumbers, carpenters near me</span>
                </div>
                <div class="w-10 h-10 bg-slate-100 text-slate-900 rounded-xl flex items-center justify-center"><i class="fa-solid fa-magnifying-glass"></i></div>
            </button>

            <button onclick="enterApp('register')" class="w-full bg-green-600 hover:bg-green-700 text-white p-5 rounded-2xl font-bold flex items-center justify-between transition text-left shadow-xl shadow-green-900/20">
                <div>
                    <span class="text-base block">Register My Business / Trade</span>
                    <span class="text-xs text-green-200 font-normal">Create your 100% verified digital profile</span>
                </div>
                <div class="w-10 h-10 bg-green-500 text-white rounded-xl flex items-center justify-center"><i class="fa-solid fa-store text-sm"></i></div>
            </button>
        </div>
    </div>

    <div id="mainAppLayout" class="hidden">
        <nav class="bg-white shadow-sm sticky top-0 z-50 px-4 py-3 flex justify-between items-center max-w-md mx-auto">
            <div class="flex items-center gap-2" onclick="location.reload();" class="cursor-pointer">
                <div class="bg-green-600 text-white p-2 rounded-lg"><i class="fa-solid fa-shield-check"></i></div>
                <div>
                    <h1 class="font-bold text-base tracking-tight text-slate-900">Anambra<span class="text-green-600">Hub</span></h1>
                    <span class="text-[9px] text-green-600 font-bold bg-green-50 px-1 rounded">100% Verified</span>
                </div>
            </div>
            
            <button id="emergencyToggle" class="bg-slate-100 border border-slate-200 text-slate-700 px-3 py-1.5 rounded-xl font-bold text-xs flex items-center gap-1.5 transition">
                <div class="w-2.5 h-2.5 rounded-full bg-slate-400 animate-pulse" id="emergencyDot"></div>
                Emergency Mode
            </button>
        </nav>

        <main class="max-w-md mx-auto bg-white min-h-screen shadow-md relative pb-24">
            <div class="p-4 bg-white border-b border-slate-100">
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <input type="text" id="searchInput" placeholder="Find mechanics, tailors, plumbers..." class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-100 border-none text-slate-800 focus:outline-none focus:ring-2 focus:ring-green-500 transition text-sm">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                    </div>
                    <button id="gpsBtn" class="bg-green-50 text-green-600 px-4 rounded-xl border border-green-200 text-sm font-semibold whitespace-nowrap"><i class="fa-solid fa-location-crosshairs"></i> Near Me</button>
                </div>
                
                <div class="flex gap-2 mt-4 overflow-x-auto hide-scrollbar">
                    <button class="city-filter active bg-slate-800 text-white px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap" data-city="all">All LGAs</button>
                    <button class="city-filter bg-slate-100 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap" data-city="nnewi">Nnewi North</button>
                    <button class="city-filter bg-slate-100 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap" data-city="awka">Awka South</button>
                    <button class="city-filter bg-slate-100 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap" data-city="onitsha">Onitsha North</button>
                </div>
            </div>

            <div class="px-4 py-4 bg-slate-50 border-b border-slate-100">
                <div class="flex gap-4 overflow-x-auto hide-scrollbar pb-1">
                    <div class="category-filter flex flex-col items-center gap-1.5 min-w-[65px] cursor-pointer" data-category="mechanic">
                        <div class="w-12 h-12 rounded-full bg-amber-100 flex items-center justify-center text-amber-700"><i class="fa-solid fa-wrench"></i></div>
                        <span class="text-[10px] font-medium text-slate-600">Mechanics</span>
                    </div>
                    <div class="category-filter flex flex-col items-center gap-1.5 min-w-[65px] cursor-pointer" data-category="plumber">
                        <div class="w-12 h-12 rounded-full bg-sky-100 flex items-center justify-center text-sky-600"><i class="fa-solid fa-faucet"></i></div>
                        <span class="text-[10px] font-medium text-slate-600">Plumbers</span>
                    </div>
                    <div class="category-filter flex flex-col items-center gap-1.5 min-w-[65px] cursor-pointer" data-category="carpenter">
                        <div class="w-12 h-12 rounded-full bg-orange-100 flex items-center justify-center text-orange-700"><i class="fa-solid fa-hammer"></i></div>
                        <span class="text-[10px] font-medium text-slate-600">Carpenters</span>
                    </div>
                </div>
            </div>

            <div class="p-4">
                <h3 class="font-semibold text-sm text-slate-500 mb-3 uppercase tracking-wider" id="resultsTitle">Verified Businesses</h3>
                <div id="businessList" class="flex flex-col gap-3"></div>
            </div>
        </main>
    </div>

    <div id="artisanRegistrationForm" class="hidden max-w-md mx-auto bg-white min-h-screen p-6">
        <div class="flex items-center gap-3 border-b border-slate-100 pb-4 mb-6">
            <button onclick="location.reload();" class="text-slate-500 p-1"><i class="fa-solid fa-arrow-left text-lg"></i></button>
            <h2 class="text-xl font-bold text-slate-900">Register Your Business</h2>
        </div>
        
        <form id="regForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Business or Trade Name *</label>
                <input type="text" id="regName" required placeholder="e.g., Emeka Quality Woodwork" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Select Profession Category *</label>
                <select id="regCategory" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white">
                    <option value="mechanic">Mechanical Engineering</option>
                    <option value="plumber">Plumbing & Piping</option>
                    <option value="carpenter">Carpentry & Furniture</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Anambra Local Government Area (LGA) *</label>
                <select id="regCity" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white">
                    <option value="nnewi">Nnewi North</option>
                    <option value="awka">Awka South</option>
                    <option value="onitsha">Onitsha North</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Detailed Workshop Address *</label>
                <input type="text" id="regAddress" required placeholder="e.g., Shop 4, Line B, Timber Market, Nnewi" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">WhatsApp Phone Number *</label>
                <input type="tel" id="regPhone" required placeholder="e.g., 08031234567" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Opening/Closing Hours</label>
                <input type="text" id="regHours" placeholder="e.g., 8:00 AM - 6:00 PM" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Describe Your Services & Base Starting Price</label>
                <textarea id="regDesc" placeholder="e.g., Fixing engines, brake issues. Diagnostics starts from N3,500." class="w-full border border-slate-200 rounded-xl p-3 text-sm h-24 focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
            </div>
            
            <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold transition shadow-lg shadow-green-200">Submit Setup Details via WhatsApp</button>
        </form>
    </div>

    <div id="detailsModal" class="fixed inset-0 bg-slate-900/40 hidden items-end sm:items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl transform translate-y-full transition-transform duration-300 shadow-2xl overflow-hidden max-h-[92vh] flex flex-col" id="modalContent">
            
            <div class="w-full h-44 bg-slate-200 relative shrink-0">
                <img id="modalStoreImage" src="" alt="Store front" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent"></div>
                <button id="closeModal" class="absolute top-4 right-4 bg-white/80 w-8 h-8 rounded-full flex items-center justify-center shadow"><i class="fa-solid fa-xmark"></i></button>
                
                <div class="absolute bottom-4 left-4 flex items-center gap-3">
                    <div id="modalIcon" class="w-11 h-11 rounded-xl flex items-center justify-center text-white text-lg shadow-md border-2 border-white"></div>
                    <div>
                        <h3 id="modalTitle" class="font-bold text-base text-white leading-tight drop-shadow"></h3>
                        <p id="modalCategory" class="text-xs text-green-300 font-medium drop-shadow"></p>
                    </div>
                </div>
            </div>
            
            <div class="p-5 overflow-y-auto hide-scrollbar space-y-4">
                
                <div class="grid grid-cols-3 gap-2 bg-slate-50 border border-slate-100 rounded-xl p-3 text-center">
                    <div>
                        <span id="metricJobs" class="block font-black text-slate-900 text-base leading-none"></span>
                        <span class="text-[9px] text-slate-400 font-medium uppercase mt-1 block">Jobs Completed</span>
                    </div>
                    <div class="border-x border-slate-200">
                        <span id="metricDelivery" class="block font-black text-green-600 text-base leading-none"></span>
                        <span class="text-[9px] text-slate-400 font-medium uppercase mt-1 block">On-Time Rate</span>
                    </div>
                    <div>
                        <span id="metricDist" class="block font-black text-blue-600 text-base leading-none"></span>
                        <span class="text-[9px] text-slate-400 font-medium uppercase mt-1 block">Distance Away</span>
                    </div>
                </div>

                <p id="modalDesc" class="text-sm text-slate-600 leading-relaxed"></p>
                
                <div class="bg-slate-50 rounded-xl p-4 space-y-2.5 text-xs border border-slate-100">
                    <div class="flex items-center gap-2"><i class="fa-solid fa-location-dot text-red-500 w-4"></i><span id="modalLocation" class="font-semibold"></span></div>
                    <div class="flex items-center gap-2"><i class="fa-solid fa-clock text-amber-500 w-4"></i><span id="modalHours" class="font-semibold"></span></div>
                    <div class="flex items-center gap-2"><i class="fa-solid fa-tags text-green-500 w-4"></i><span id="modalPrice" class="font-semibold text-green-700"></span></div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button id="directCallBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 transition shadow">
                        <i class="fa-solid fa-phone"></i> Call Direct
                    </button>
                    <button id="hireBtn" class="w-full bg-green-600 hover:bg-green-700 text-white py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 transition shadow">
                        <i class="fa-brands fa-whatsapp text-lg"></i> WhatsApp Now
                    </button>
                </div>
            </div>
        </div>
    </div>

        const ADMIN_WHATSAPP_NUMBER = "2348000000000"; 
        
        let isEmergencyMode = false;
