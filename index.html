<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnambraHub - Verified Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .app-container { user-select: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="text-slate-800 antialiased app-container">

    <div id="mainAppLayout">
        <nav class="bg-white shadow-sm sticky top-0 z-50 px-4 py-3 flex justify-between items-center max-w-md mx-auto">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showSection('directory');">
                <div class="bg-green-600 text-white p-2 rounded-lg"><i class="fa-solid fa-shield-check"></i></div>
                <div>
                    <h1 class="font-bold text-base tracking-tight text-slate-900">Anambra<span class="text-green-600">Hub</span></h1>
                    <span class="text-[9px] text-green-600 font-bold bg-green-50 px-1 rounded">100% Verified</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="emergencyToggle" class="bg-slate-100 border border-slate-200 text-slate-700 px-2 py-1.5 rounded-xl font-bold text-xs flex items-center gap-1 transition">
                    <div class="w-2 h-2 rounded-full bg-slate-400 animate-pulse" id="emergencyDot"></div>
                    🚨 Emergency
                </button>
                
                <button onclick="showSection('register')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded-xl font-bold text-xs flex items-center gap-1 transition shadow-md shadow-green-900/10">
                    <i class="fa-solid fa-plus text-[10px]"></i> List Biz
                </button>
            </div>
        </nav>

        <main id="directorySection" class="max-w-md mx-auto bg-white min-h-screen shadow-md relative pb-24">
            <div class="p-4 bg-white border-b border-slate-100">
                <div class="flex gap-2">
                    <div class="relative flex-1">
                        <input type="text" id="searchInput" placeholder="Find mechanics, tailors, plumbers..." class="w-full pl-10 pr-4 py-3 rounded-xl bg-slate-100 border-none text-slate-800 focus:outline-none focus:ring-2 focus:ring-green-500 transition text-sm">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400"></i>
                    </div>
                    <button id="gpsBtn" class="bg-green-50 text-green-600 px-4 rounded-xl border border-green-200 text-sm font-semibold whitespace-nowrap"><i class="fa-solid fa-location-crosshairs"></i> Near Me</button>
                </div>
                
                <div class="flex gap-2 mt-4 overflow-x-auto hide-scrollbar">
                    <button class="city-filter active bg-slate-800 text-white px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap" data-city="all">All LGAs</button>
                    <button class="city-filter bg-slate-100 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap" data-city="nnewi">Nnewi North</button>
                    <button class="city-filter bg-slate-100 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap" data-city="awka">Awka South</button>
                    <button class="city-filter bg-slate-100 text-slate-600 px-4 py-1.5 rounded-full text-xs font-medium whitespace-nowrap" data-city="onitsha">Onitsha North</button>
                </div>
            </div>

            <div class="px-4 py-4 bg-slate-50 border-b border-slate-100">
                <div class="flex gap-4 overflow-x-auto hide-scrollbar pb-1">
                    <div class="category-filter flex flex-col items-center gap-1.5 min-w-[65px] cursor-pointer" data-category="mechanic">
                        <div class="w-12 h-12 rounded-full bg-amber-100 flex items-center justify-center text-amber-700"><i class="fa-solid fa-wrench"></i></div>
                        <span class="text-[10px] font-medium text-slate-600">Mechanics</span>
                    </div>
                    <div class="category-filter flex flex-col items-center gap-1.5 min-w-[65px] cursor-pointer" data-category="plumber">
                        <div class="w-12 h-12 rounded-full bg-sky-100 flex items-center justify-center text-sky-600"><i class="fa-solid fa-faucet"></i></div>
                        <span class="text-[10px] font-medium text-slate-600">Plumbers</span>
                    </div>
                    <div class="category-filter flex flex-col items-center gap-1.5 min-w-[65px] cursor-pointer" data-category="carpenter">
                        <div class="w-12 h-12 rounded-full bg-orange-100 flex items-center justify-center text-orange-700"><i class="fa-solid fa-hammer"></i></div>
                        <span class="text-[10px] font-medium text-slate-600">Carpenters</span>
                    </div>
                </div>
            </div>

            <div class="p-4">
                <h3 class="font-semibold text-sm text-slate-500 mb-3 uppercase tracking-wider" id="resultsTitle">Verified Businesses</h3>
                <div id="businessList" class="flex flex-col gap-3"></div>
            </div>
        </main>

        <main id="artisanRegistrationForm" class="hidden max-w-md mx-auto bg-white min-h-screen p-6 shadow-md">
            <div class="flex items-center gap-3 border-b border-slate-100 pb-4 mb-6">
                <button onclick="showSection('directory')" class="text-slate-500 p-1"><i class="fa-solid fa-arrow-left text-lg"></i></button>
                <div>
                    <h2 class="text-xl font-bold text-slate-900">Register Your Business</h2>
                    <p class="text-xs text-slate-400 mt-0.5">Submit details to create your digital profile</p>
                </div>
            </div>
            
            <form id="regForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Business or Trade Name *</label>
                    <input type="text" id="regName" required placeholder="e.g., Emeka Quality Woodwork" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Select Profession Category *</label>
                    <select id="regCategory" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white">
                        <option value="mechanic">Mechanical Engineering</option>
                        <option value="plumber">Plumbing & Piping</option>
                        <option value="carpenter">Carpentry & Furniture</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Anambra Local Government Area (LGA) *</label>
                    <select id="regCity" class="w-full border border-slate-200 rounded-xl p-3 text-sm bg-white">
                        <option value="nnewi">Nnewi North</option>
                        <option value="awka">Awka South</option>
                        <option value="onitsha">Onitsha North</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Detailed Workshop Address *</label>
                    <input type="text" id="regAddress" required placeholder="e.g., Shop 4, Line B, Timber Market, Nnewi" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                
                <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">WhatsApp Phone Number *</label>
                        <input type="tel" id="regPhone" required placeholder="e.g., 08031234567" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Business Email <span class="text-slate-400 font-normal">(Optional)</span></label>
                        <input type="email" id="regEmail" placeholder="e.g., info@biz.com" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Opening/Closing Hours</label>
                    <input type="text" id="regHours" placeholder="e.g., 8:00 AM - 6:00 PM" class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Describe Your Services & Base Starting Price</label>
                    <textarea id="regDesc" placeholder="e.g., Fixing engines, brake issues. Diagnostics starts from N3,500." class="w-full border border-slate-200 rounded-xl p-3 text-sm h-20 focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
                </div>
                
                <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold transition shadow-lg shadow-green-200">Submit Verification Request via WhatsApp</button>
            </form>
        </main>
    </div>

    <div id="detailsModal" class="fixed inset-0 bg-slate-900/40 hidden items-end sm:items-center justify-center z-[100] backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-2xl transform translate-y-full transition-transform duration-300 shadow-2xl overflow-hidden max-h-[92vh] flex flex-col" id="modalContent">
            
            <div class="w-full h-44 bg-slate-200 relative shrink-0">
                <img id="modalStoreImage" src="" alt="Store front" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent"></div>
                <button id="closeModal" class="absolute top-4 right-4 bg-white/80 w-8 h-8 rounded-full flex items-center justify-center shadow"><i class="fa-solid fa-xmark"></i></button>
                
                <div class="absolute bottom-4 left-4 flex items-center gap-3">
                    <div id="modalIcon" class="w-11 h-11 rounded-xl flex items-center justify-center text-white text-lg shadow-md border-2 border-white"></div>
                    <div>
                        <h3 id="modalTitle" class="font-bold text-base text-white leading-tight drop-shadow"></h3>
                        <p id="modalCategory" class="text-xs text-green-300 font-medium drop-shadow"></p>
                    </div>
                </div>
            </div>
            
            <div class="p-5 overflow-y-auto hide-scrollbar space-y-4">
                <div class="grid grid-cols-3 gap-2 bg-slate-50 border border-slate-100 rounded-xl p-3 text-center">
                    <div>
                        <span id="metricJobs" class="block font-black text-slate-900 text-base leading-none"></span>
                        <span class="text-[9px] text-slate-400 font-medium uppercase mt-1 block">Jobs Completed</span>
                    </div>
                    <div class="border-x border-slate-200">
                        <span id="metricDelivery" class="block font-black text-green-600 text-base leading-none"></span>
                        <span class="text-[9px] text-slate-400 font-medium uppercase mt-1 block">On-Time Rate</span>
                    </div>
                    <div>
                        <span id="metricDist" class="block font-black text-blue-600 text-base leading-none"></span>
                        <span class="text-[9px] text-slate-400 font-medium uppercase mt-1 block">Distance Away</span>
                    </div>
                </div>

                <p id="modalDesc" class="text-sm text-slate-600 leading-relaxed"></p>
                
                <div class="bg-slate-50 rounded-xl p-4 space-y-2.5 text-xs border border-slate-100">
                    <div class="flex items-center gap-2"><i class="fa-solid fa-location-dot text-red-500 w-4"></i><span id="modalLocation" class="font-semibold"></span></div>
                    <div class="flex items-center gap-2"><i class="fa-solid fa-clock text-amber-500 w-4"></i><span id="modalHours" class="font-semibold"></span></div>
                    <div class="flex items-center gap-2"><i class="fa-solid fa-tags text-green-500 w-4"></i><span id="modalPrice" class="font-semibold text-green-700"></span></div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-2">
                    <button id="directCallBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 transition shadow">
                        <i class="fa-solid fa-phone"></i> Call Direct
                    </button>
                    <button id="hireBtn" class="w-full bg-green-600 hover:bg-green-700 text-white py-3.5 rounded-xl font-bold flex justify-center items-center gap-2 transition shadow">
                        <i class="fa-brands fa-whatsapp text-lg"></i> WhatsApp Now
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_WHATSAPP_NUMBER = "2348000000000"; 
        let isEmergencyMode = false;

        const businesses = [
            { id: "M01", name: "Chidi Auto Mechanical Works", category: "mechanic", city: "nnewi", location: "Nnewi North LGA, Anambra", color: "bg-amber-500", icon: "fa-wrench", hours: "8:00 AM - 6:30 PM", price: "Diagnostics from ₦3,500", phone: "2348000000000", image: "https://images.unsplash.com/photo-1486006920555-c77dce18193b?w=500", jobs: "142", delivery: "96%", distance: "1.4 km", emergency: true, desc: "Expert Japanese car repair specialist. On-site emergency mechanical breakdowns recovery across Nnewi zones." },
            { id: "P01", name: "Okey Plumbing Services", category: "plumber", city: "awka", location: "Awka South LGA, Anambra", color: "bg-sky-500", icon: "fa-faucet", hours: "7:30 AM - 8:00 PM", price: "Leak repairs from ₦5,000", phone: "2348000000000", image: "https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=500", jobs: "68", delivery: "90%", distance: "2.8 km", emergency: true, desc: "Certified emergency piping solutions framework specialist. Borehole repairs, clearing clogged sewers instantly." },
            { id: "C01", name: "Onitsha Premium Woodcraft", category: "carpenter", city: "onitsha", location: "Onitsha North LGA, Anambra", color: "bg-orange-500", icon: "fa-hammer", hours: "8:00 AM - 6:00 PM", price: "Furniture repairs from ₦7,500", phone: "2348000000000", image: "https://images.unsplash.com/photo-1533090161767-e6ffed986c88?w=500", jobs: "94", delivery: "85%", distance: "4.1 km", emergency: false, desc: "High finish wood structuring frameworks. Bespoke luxury cabinet designs, door alignment repair works." }
        ];

        // Screen Navigation Switcher
        function showSection(target) {
            if (target === 'directory') {
                document.getElementById('directorySection').classList.remove('hidden');
                document.getElementById('artisanRegistrationForm').classList.add('hidden');
                filterData();
            } else if (target === 'register') {
                document.getElementById('directorySection').classList.add('hidden');
                document.getElementById('artisanRegistrationForm').classList.remove('hidden');
            }
        }

        // Form Submit Handler
        document.getElementById('regForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const category = document.getElementById('regCategory').value;
            const lga = document.getElementById('regCity').value;
            const address = document.getElementById('regAddress').value;
            const phone = document.getElementById('regPhone').value;
            const email = document.getElementById('regEmail').value || 'Not Provided';
            const hours = document.getElementById('regHours').value;
            const desc = document.getElementById('regDesc').value;

            const textMessage = `Hello AnambraHub, I want to request a trade listing verification:\n\n*Biz Name:* ${name}\n*Trade:* ${category}\n*LGA:* ${lga}\n*Address:* ${address}\n*Phone:* ${phone}\n*Email:* ${email}\n*Hours:* ${hours}\n*Details:* ${desc}`;
            window.open(`https://wa.me/${ADMIN_WHATSAPP_NUMBER}?text=${encodeURIComponent(textMessage)}`, '_blank');
        });

        // Emergency Mode Controller
        const emergencyToggle = document.getElementById('emergencyToggle');
        const emergencyDot = document.getElementById('emergencyDot');
        
        emergencyToggle.addEventListener('click', () => {
            isEmergencyMode = !isEmergencyMode;
            if(isEmergencyMode) {
                emergencyToggle.classList.remove('bg-slate-100', 'text-slate-700', 'border-slate-200');
                emergencyToggle.classList.add('bg-red-600', 'text-white', 'border-red-700');
                emergencyDot.classList.remove('bg-slate-400');
                emergencyDot.classList.add('bg-white');
            } else {
                emergencyToggle.classList.remove('bg-red-600', 'text-white', 'border-red-700');
                emergencyToggle.classList.add('bg-slate-100', 'text-slate-700', 'border-slate-200');
                emergencyDot.classList.remove('bg-white');
                emergencyDot.classList.add('bg-slate-400');
            }
            filterData();
        });

        const businessListContainer = document.getElementById('businessList');
        const searchInput = document.getElementById('searchInput');
        const resultsTitle = document.getElementById('resultsTitle');
        let currentCity = 'all';
        let currentCategory = 'all';

        function renderBusinesses(data) {
            businessListContainer.innerHTML = '';
            if (data.length === 0) {
                businessListContainer.innerHTML = `
                    <div class="text-center py-12 text-slate-500 w-full bg-slate-50 rounded-2xl border border-dashed p-4">
                        <p class="font-medium text-sm">No profiles found for this selection.</p>
                    </div>`;
                return;
            }

            data.forEach(biz => {
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-100 rounded-2xl p-2.5 shadow-sm hover:shadow transition cursor-pointer flex gap-3 items-center mx-1";
                card.onclick = () => openModal(biz);
                card.innerHTML = `
                    <div class="w-16 h-16 rounded-xl bg-slate-100 overflow-hidden shrink-0 relative">
                        <img src="${biz.image}" class="w-full h-full object-cover">
                        <div class="absolute bottom-1 right-1 w-5 h-5 rounded-md ${biz.color} text-white flex items-center justify-center text-[9px] shadow"><i class="fa-solid ${biz.icon}"></i></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center justify-between"><h4 class="font-bold text-slate-800 text-sm truncate">${biz.name}</h4><span class="text-[10px] font-bold text-blue-600 shrink-0 bg-blue-50 px-1 rounded">${biz.distance}</span></div>
                        <p class="text-[11px] text-slate-500 truncate mt-0.5">${biz.desc}</p>
                        <div class="flex items-center gap-2 mt-2 text-[10px] font-medium">
                            <span class="bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded">${biz.city.toUpperCase()}</span>
                            <span class="text-slate-400 font-normal">| Jobs: <strong>${biz.jobs}</strong></span>
                        </div>
                    </div>
                `;
                businessListContainer.appendChild(card);
            });
        }

        function filterData() {
            let term = searchInput.value.toLowerCase();
            let filtered = businesses.filter(biz => {
                let matchesSearch = biz.name.toLowerCase().includes(term) || biz.desc.toLowerCase().includes(term);
                let matchesCity = currentCity === 'all' || biz.city === currentCity;
                let matchesCategory = currentCategory === 'all' || biz.category === currentCategory;
                let matchesEmergency = !isEmergencyMode || biz.emergency === true;
                return matchesSearch && matchesCity && matchesCategory && matchesEmergency;
            });
            renderBusinesses(filtered);
            resultsTitle.textContent = isEmergencyMode ? "🚨 EMERGENCY SERVICES ACTIVE" : "Verified Businesses";
        }

        searchInput.addEventListener('input', filterData);
        document.querySelectorAll('.city-filter').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.city-filter').forEach(b => b.classList.remove('bg-slate-800', 'text-white'));
                e.target.classList.add('bg-slate-800', 'text-white');
                currentCity = e.target.getAttribute('data-city');
                filterData();
            });
        });

        document.querySelectorAll('.category-filter').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let cat = e.currentTarget.getAttribute('data-category');
                if (currentCategory === cat) {
                    currentCategory = 'all';
                    document.querySelectorAll('.category-filter > div').forEach(div => div.classList.remove('ring-2', 'ring-green-500', 'ring-offset-2'));
                } else {
                    currentCategory = cat;
                    document.querySelectorAll('.category-filter > div').forEach(div => div.classList.remove('ring-2', 'ring-green-500', 'ring-offset-2'));
                    e.currentTarget.querySelector('div').classList.add('ring-2', 'ring-green-500', 'ring-offset-2');
                }
                filterData();
            });
        });

        const modal = document.getElementById('detailsModal');
        const modalContent = document.getElementById('modalContent');
        let currentBusinessSelected = null;

        function openModal(biz) {
            currentBusinessSelected = biz;
            document.getElementById('modalStoreImage').src = biz.image;
            document.getElementById('modalIcon').className = `w-11 h-11 rounded-xl flex items-center justify-center text-white text-lg shadow-md border-2 border-white ${biz.color}`;
            document.getElementById('modalIcon').innerHTML = `<i class="fa-solid ${biz.icon}"></i>`;
            document.getElementById('modalTitle').textContent = biz.name;
            document.getElementById('modalDesc').textContent = biz.desc;
            document.getElementById('modalLocation').textContent = biz.location;
            document.getElementById('modalHours').textContent = biz.hours;
            document.getElementById('modalPrice').textContent = biz.price;
            
            document.getElementById('metricJobs').textContent = biz.jobs;
            document.getElementById('metricDelivery').textContent = biz.delivery;
            document.getElementById('metricDist').textContent = biz.distance;

            const catNames = {mechanic: "Mechanical Service", plumber: "Plumbing Service", carpenter: "Premium Woodcraft"};
            document.getElementById('modalCategory').textContent = catNames[biz.category] || biz.category;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => { modalContent.classList.remove('translate-y-full'); }, 10);
        }

        function closeModalFn() {
            modalContent.classList.add('translate-y-full');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
        }

        document.getElementById('closeModal').addEventListener('click', closeModalFn);

        document.getElementById('directCallBtn').addEventListener('click', () => {
            if (currentBusinessSelected) window.location.href = `tel:${currentBusinessSelected.phone}`;
        });

        document.getElementById('hireBtn').addEventListener('click', () => {
            if (!currentBusinessSelected) return;
            const text = `Hello, I found your verified trade profile on AnambraHub:\n\n*Artisan Business:* ${currentBusinessSelected.name}\n*Job Code ID:* ${currentBusinessSelected.id}\n\nI need your service right away.`;
            window.open(`https://wa.me/${currentBusinessSelected.phone}?text=${encodeURIComponent(text)}`, '_blank');
        });

        // Initialize display
        filterData();
    </script>
</body>
</html>
